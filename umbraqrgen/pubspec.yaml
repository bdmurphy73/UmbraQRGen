name: umbraqrgen
description: "UmbraQRGen - A privacy-first QR code generator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  qr_flutter: ^4.1.0
  flutter_svg: ^2.2.4
  share_plus: ^12.0.2
  photo_manager: ^3.6.3
  permission_handler: ^12.0.1
  google_fonts: ^8.0.2
  path_provider: ^2.1.5
  uuid: ^4.5.3
  url_launcher: ^6.3.2
  image: ^4.8.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
